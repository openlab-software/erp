basePath: /v1
host: localhost:8080
info:
  contact:
    email: contato@patrickribeiro.dev
    name: Patrick Ribeiro
    url: https://patrickribeiro.dev
  description: |-
    Serviço responsável por gerenciar conteúdos e componentes de páginas dentro do CMS.
    Faz parte da arquitetura de microserviços utilizada no portfólio de Patrick Ribeiro.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/patrickribeirodev
  title: Content Service API
  version: "1.0"
paths:
  /pages/{pageID}/components/{componentID}:
    patch:
      consumes:
      - application/json
      description: Atualiza parcialmente um componente de uma página
      parameters:
      - description: ID da página
        in: path
        name: pageID
        required: true
        type: string
      - description: ID do componente
        in: path
        name: componentID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Componente atualizado
          schema:
            type: string
        "400":
          description: Requisição inválida
          schema:
            type: string
      summary: Edita um componente existente
      tags:
      - components
schemes:
- http
- https
swagger: "2.0"
